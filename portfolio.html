<body>
  <arka-social-floating-bar></arka-social-floating-bar>

  <!-- TOAST NOTIFICATION FOR COPY TO CLIPBOARD -->

  <!-- REUSABLE NAVBAR -->

  <main id="main-content" tabindex="-1" style="padding-top: calc(var(--space-4xl) + var(--space-xl)); padding-bottom: var(--space-4xl);">
    <section class="container">
      <div class="text-center" style="max-width: 700px; margin: 0 auto var(--space-xxl);">
        <span class="section-label">Select Curation</span>
        <h1 class="h1">The Gallery of Completed Commissions</h1>
        <p class="lead" style="margin-top: var(--space-sm);">A visual record of our design-build custom projects. Inspect our craftsmanship across Florida's premier communities.</p>
      </div>

      <!-- FILTER CONTROLS -->
      <div class="flex" style="justify-content: center; margin-bottom: var(--space-xxl); flex-wrap: wrap; gap: var(--space-sm);" role="tablist" aria-label="Project Filter Options">
        <button class="portal-btn active filter-btn" data-filter="all" id="filter-all-btn" role="tab" aria-selected="true">All Works</button>
        <button class="portal-btn filter-btn" data-filter="kitchens" id="filter-kitchens-btn" role="tab" aria-selected="false">Atelier Kitchens</button>
        <button class="portal-btn filter-btn" data-filter="wardrobes" id="filter-wardrobes-btn" role="tab" aria-selected="false">Bespoke Closets</button>
        <button class="portal-btn filter-btn" data-filter="panels" id="filter-panels-btn" role="tab" aria-selected="false">Integrated Panels</button>
      </div>

      <!-- PROJECT GRID -->
      <div class="grid grid-2" id="gallery-grid">
        <arka-project-card 
          title="The Calacatta Atelier Kitchen" 
          subtitle="Windermere, FL" 
          image="assets/images/kitchen_hero.webp" 
          category="kitchens"
          desc="A seamless convergence of matched Calacatta marble slab islands, flat-panel walnut cabinet systems, and integrated warm LED accent lights.">
        </arka-project-card>

        <arka-project-card 
          title="Minimalist White Oak Joinery" 
          subtitle="Winter Park, FL" 
          image="assets/images/cabinetry_detail.webp" 
          category="wardrobes"
          desc="A bespoke dressing closet showing mitered oak joinery, leather drawer liners, and integrated warm-spectrum lighting.">
        </arka-project-card>

        <arka-project-card 
          title="Golden Oak Neoclassical Manor" 
          subtitle="Golden Oak, FL" 
          image="assets/images/estate_exterior.webp" 
          category="panels"
          desc="A full-scale design-build estate featuring modern concrete lines, floor-to-ceiling glass systems, and custom walnut wall panels.">
        </arka-project-card>
      </div>

      <div style="margin-top: var(--space-4xl); text-align: center;">
        <arka-project-social-cta></arka-project-social-cta>
    <arka-cta-section 
          title="Ready to manifest your spatial vision?" 
          desc="Apply for our select design-build registry to secure your site commission.">
        </arka-cta-section>
      </div>
    </section>
